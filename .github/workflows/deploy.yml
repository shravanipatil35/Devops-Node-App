name: CI-CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 435240837203.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Image
        run: docker build -t node-app .

      - name: Tag Image
        run: docker tag node-app:latest 435240837203.dkr.ecr.ap-south-1.amazonaws.com/node-app:latest

      - name: Push Image
        run: docker push 435240837203.dkr.ecr.ap-south-1.amazonaws.com/node-app:latest